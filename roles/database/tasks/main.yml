---
# tasks file for database
- name: Install MariaDB server and Python connector
  ansible.builtin.dnf:
    name:
      - mariadb-server
      - python3-PyMySQL
    state: present

- name: Ensure MariaDB is running and enabled
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true

- name: Create application databases
  community.mysql.mysql_db:
    name: "{{ item.name }}"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock
  loop: "{{ databases }}"

- name: Create application database users
  community.mysql.mysql_user:
    name: "{{ item.user }}"
    password: "{{ item.password }}"
    host: "{{ item.host }}"
    priv: "{{ item.name }}.*:ALL"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock
  loop: "{{ databases }}"

- name: Open MySQL port in firewall
  ansible.posix.firewalld:
    service: mysql
    permanent: true
    immediate: true
    state: enabled