---
# tasks file for dns
- name: Install bind
  ansible.builtin.dnf:
    name: "{{ dns_package }}"
    state: present

- name: Deploy named.conf
  ansible.builtin.template:
    src: named.conf.j2
    dest: /etc/named.conf
    owner: root
    group: named
    mode: '0640'

- name: Deploy zone file
  ansible.builtin.template:
    src: "{{ domain }}.zone.j2"
    dest: "{{ dns_zone_dir }}/{{ domain }}.zone"
    owner: root
    group: named
    mode: '0640'
  notify: Reload named

- name: Ensure named is running and enabled
  ansible.builtin.service:
    name: "{{ dns_service }}"
    state: started
    enabled: true

- name: Open DNS port in firewall
  ansible.posix.firewalld:
    service: dns
    permanent: true
    immediate: true
    state: enabled